<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Amaroad has moved</title>
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://amaroad.com/" />
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      a {
        color: #0f766e;
      }
    </style>
    <script>
      (function () {
        var targetOrigin = "https://amaroad.com";
        var pathname = window.location.pathname;
        var normalizedPath = pathname.replace(/^\/dexcode-lp(?=\/|$)/, "") || "/";
        var target = new URL(normalizedPath + window.location.search + window.location.hash, targetOrigin);
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Amaroad has moved</h1>
      <p>
        This site now lives at
        <a href="https://amaroad.com/">https://amaroad.com/</a>.
        You should be redirected automatically.
      </p>
    </main>
  </body>
</html>
